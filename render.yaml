services:
  - type: web
    name: cheongyak-viewer
    runtime: python
    plan: free
    region: singapore
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python server.py"
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: APPLYHOME_SERVICE_KEY
        sync: false   # Render 대시보드에서 직접 입력 (비밀값)
      - key: LH_SERVICE_KEY
        sync: false   # Render 대시보드에서 직접 입력 (비밀값)
      - key: KAKAO_JS_KEY
        value: "b64e0a9a2d7053f138191f35439cc35e"   # 카카오 지도 JS키(도메인 제한된 공개키 — onrender 도메인에서만 동작)
